          name: stash-api
          envVarKey: TELEGRAM_WEBHOOK_URL
      - key: YOUR_CHAT_ID
        fromService:
          type: web
          name: stash-api
          envVarKey: YOUR_CHAT_ID
      - key: GOOGLE_CLOUD_PROJECT
        fromService:
          type: web
          name: stash-api
          envVarKey: GOOGLE_CLOUD_PROJECT
      - key: GOOGLE_APPLICATION_CREDENTIALS
        fromService:
          type: web
          name: stash-api
          envVarKey: GOOGLE_APPLICATION_CREDENTIALS
      - key: VERTEX_REGION
        fromService:
          type: web
          name: stash-api
          envVarKey: VERTEX_REGION
      - key: GEMINI_MODEL
        fromService:
          type: web
          name: stash-api
          envVarKey: GEMINI_MODEL
      - key: GEMINI_VIDEO_MODEL
        fromService:
          type: web
          name: stash-api
          envVarKey: GEMINI_VIDEO_MODEL
      - key: GEMINI_INLINE_VIDEO_MAX_BYTES
        fromService:
          type: web
          name: stash-api
          envVarKey: GEMINI_INLINE_VIDEO_MAX_BYTES
      - key: R2_ACCOUNT_ID
        fromService:
          type: web
          name: stash-api
          envVarKey: R2_ACCOUNT_ID
      - key: R2_ACCESS_KEY
        fromService:
          type: web
          name: stash-api
          envVarKey: R2_ACCESS_KEY
      - key: R2_SECRET_KEY
        fromService:
          type: web
          name: stash-api
          envVarKey: R2_SECRET_KEY
      - key: R2_BUCKET_NAME
        fromService:
