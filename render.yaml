# Render Blueprint for the Stash backend prototype stack.
#
# Create this from Render Dashboard > New > Blueprint and connect the GitHub repo.
# Secret values marked with sync: false must be entered in Render during setup.
envVarGroups:
  - name: stash-shared-config
    envVars:
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
      - key: VERTEX_REGION
        value: us-central1
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_VIDEO_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_INLINE_VIDEO_MAX_BYTES
        value: "18000000"
      - key: DASHBOARD_URL
        value: https://stash-two-zeta.vercel.app
      - key: CORS_ORIGINS
        value: https://stash-two-zeta.vercel.app
      - key: SKIP_AUTH
        value: "false"
      - key: VIDEO_URL_ANALYSIS_ENABLED
        value: "true"
      - key: VIDEO_URL_MAX_BYTES
        value: "18000000"
      - key: VIDEO_URL_MAX_DURATION_SECONDS
        value: "180"
      - key: VIDEO_URL_DOWNLOAD_FORMAT
        value: bestvideo[ext=mp4][height<=720]+bestaudio[ext=m4a]/best[ext=mp4][height<=720]/best[height<=720]/best
      - key: YTDLP_SOCKET_TIMEOUT_SECONDS
        value: "15"
      - key: YTDLP_RETRIES
        value: "2"
      - key: YTDLP_FRAGMENT_RETRIES
        value: "2"
      - key: WHISPER_MODEL
        value: base
      - key: WHISPER_MIN_AVAILABLE_MEMORY_BYTES
        value: "838860800"
      - key: STASH_TMP_DIR
        value: /tmp

services:
  - type: web
    name: stash-api
    runtime: docker
    repo: https://github.com/Nikhil123n/stash
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: sh -c "python -m alembic upgrade head && (celery -A tasks worker --loglevel=info --concurrency=1 &) && (celery -A tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule &) && exec uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    plan: free
    region: oregon
    autoDeployTrigger: commit
    envVars:
      - fromGroup: stash-shared-config
      - key: DATABASE_URL
        fromDatabase:
          name: stash-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stash-redis
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: YOUR_CHAT_ID
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_BUCKET_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: keyvalue
    name: stash-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: stash-postgres
    databaseName: stash
    user: stash
    plan: free
    region: oregon
    postgresMajorVersion: "17"
