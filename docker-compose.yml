services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    command:
      [
        "sh",
        "-c",
        "export DATABASE_URL=\"postgresql+psycopg2://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}\" REDIS_URL=\"redis://redis:6379/0\"; exec uvicorn main:app --host 0.0.0.0 --port 8000",
      ]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
    command:
      [
        "sh",
        "-c",
        "export DATABASE_URL=\"postgresql+psycopg2://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}\" REDIS_URL=\"redis://redis:6379/0\"; exec celery -A tasks worker --loglevel=info --concurrency=2",
      ]

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
    command:
      [
        "sh",
        "-c",
        "export DATABASE_URL=\"postgresql+psycopg2://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}\" REDIS_URL=\"redis://redis:6379/0\"; exec celery -A tasks beat --loglevel=info --schedule=/tmp/celerybeat-schedule",
      ]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
